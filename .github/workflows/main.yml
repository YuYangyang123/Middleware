name: Build ARM64 Compatible

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Python 3.10 Buster ARM64
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work/middleware_final_project \
            python:3.10-slim-buster \
            bash -c '
              set -e
              python -m pip install --upgrade pip
              pip install pyinstaller
              pyinstaller --onedir -n middleware-app middleware/app.py \
                --add-data "config/default_config.json:config" \
                --add-data "examples/sample_input.json:examples"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-compatible-build
          path: middleware_final_project/dist/
