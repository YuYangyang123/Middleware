name: Build ARM64 Compatible

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in manylinux2014
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work/middleware_final_project \
            quay.io/pypa/manylinux2014_aarch64 \
            bash -c '
              /opt/python/cp312-cp312/bin/python -m pip install --upgrade pip
              /opt/python/cp312-cp312/bin/python -m pip install pyinstaller
              /opt/python/cp312-cp312/bin/pyinstaller --onedir -n middleware-app middleware/app.py \
                --add-data "config/default_config.json:config" \
                --add-data "examples/sample_input.json:examples"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-compatible-build
          path: middleware_final_project/dist/
