name: Build ARM64 Rocky8 Compatible

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Rocky8 ARM64
        run: |
          docker run --rm \
            --platform linux/arm64/v8 \
            -v "$PWD":/work \
            -w /work \
            rockylinux:8 \
            bash -c '
              set -e

              dnf install -y gcc make wget tar gzip \
                zlib-devel bzip2-devel openssl-devel libffi-devel \
                xz-devel sqlite-devel readline-devel ncurses-devel \
                binutils

              cd /tmp
              wget https://www.python.org/ftp/python/3.10.13/Python-3.10.13.tgz
              tar -xzf Python-3.10.13.tgz
              cd Python-3.10.13

              ./configure --prefix=/opt/python310 --enable-shared
              make -j2
              make install

              export LD_LIBRARY_PATH=/opt/python310/lib:$LD_LIBRARY_PATH

              /opt/python310/bin/python3.10 -m ensurepip
              /opt/python310/bin/python3.10 -m pip install --upgrade pip
              /opt/python310/bin/python3.10 -m pip install pyinstaller

              cd /work/middleware_final_project

              /opt/python310/bin/pyinstaller \
                --onedir \
                -n middleware-app \
                middleware/app.py \
                --add-data "config/default_config.json:config" \
                --add-data "examples/sample_input.json:examples"
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-rocky8-build
          path: middleware_final_project/dist/
