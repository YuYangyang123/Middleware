name: Build linux arm64 centos7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build in CentOS7 ARM64
        run: |
          set -eux
          rm -rf artifact-output
          mkdir -p artifact-output

          docker run --rm --platform linux/arm64/v8 \
            -v "$PWD:/src" \
            -w /src \
            arm64v8/centos:7 /bin/bash -lc '
          set -eux

          echo "=== /src ==="
          ls -lah /src
          find /src -maxdepth 3 -type f -name "run_app.py" -o -name "app.py"

          yum clean all || true

          cd /src/middleware_final_project

          echo "=== project ==="
          pwd
          ls -lah

          rm -rf dist build

          echo "=== check run_app ==="
          cat run_app.py

          echo "=== temporarily build with system python if exists ==="
          python3 --version || true
          python --version || true

          echo "=== full tree ==="
          find /src -maxdepth 5 -type d -name dist -o -type d -name "middleware-app" -o -type f -name "middleware-app"

          mkdir -p /src/artifact-output/debug
          cp -a /src/middleware_final_project /src/artifact-output/debug/source-tree || true
          '

      - name: Show artifact files
        run: |
          echo "=== after docker ==="
          pwd
          find . -maxdepth 5 -print

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: artifact-output
