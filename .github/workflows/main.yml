name: Build ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build
        run: |
          cd middleware_final_project
          pyinstaller --onedir -n middleware-app middleware/app.py \
            --add-data "config/default_config.json:config" \
            --add-data "examples/sample_input.json:examples"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-build
          path: middleware_final_project/dist/
